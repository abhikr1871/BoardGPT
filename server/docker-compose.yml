services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: chessai
      POSTGRES_PASSWORD: chessai
      POSTGRES_DB: chessai
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chessai']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: postgres://chessai:chessai@db:5432/chessai
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
